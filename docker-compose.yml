version: "3.9"

services:
  python-backend:
    build: ./backend
    container_name: office-toolkit-python
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - REMOVE_BG_API_KEY=${REMOVE_BG_API_KEY:-}
    volumes:
      - python_uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  python_uploads:
